name: Deploy Vue to VPS

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Build Vue App
        run: npm run build

      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: '5.223.73.76'
          username: 'root'
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: 'dist/*'
          target: '/var/www/grameenschool.online/'
          strip_components: 1
