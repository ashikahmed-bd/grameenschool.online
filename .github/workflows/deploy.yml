name: Deploy Vue.js to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # -----------------------------
      # Build Vue.js project locally
      # -----------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Build Vue.js
        run: npm run build

      # -----------------------------
      # Upload Vue.js build to VPS
      # -----------------------------
      - name: Upload Vue build to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: '5.223.73.76'
          username: 'root'
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: dist/*
          target: /var/www/grameenschool.online/

      # -----------------------------
      # Deploy Laravel to VPS
      # -----------------------------
      - name: Deploy Laravel via SSH
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: '5.223.73.76'
          username: 'root'
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/grameenschool.online/
            git reset --hard
            git clean -fd
            git pull origin main
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            echo "Laravel deployment complete!"
