name: Deploy Vue to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue app
        run: npm run build

      # Clear old files including any nested 'dist'
      - name: Clear old files on VPS
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: '5.223.73.76'
          username: 'root'
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: rm -rf /var/www/grameenschool.online/*

      # Upload **all contents** of dist including hidden files
      - name: Upload Vue build to VPS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: '5.223.73.76'
          username: 'root'
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: dist/*
          target: /var/www/grameenschool.online/

      # Set permissions & reload Nginx
      - name: Set permissions and reload Nginx
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: '5.223.73.76'
          username: 'root'
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            chown -R www-data:www-data /var/www/grameenschool.online
            chmod -R 755 /var/www/grameenschool.online
            sudo systemctl reload nginx
